<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 SHT31 Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f4;
      color: #1c1c1c;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .title {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-top: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 99px;
      transition: background 0.2s, color 0.2s;
    }
    .badge.idle       { background: #e5e5e5; color: #666; }
    .badge.scanning   { background: #ede9fe; color: #5b21b6; }
    .badge.connected  { background: #dcfce7; color: #15803d; }
    .badge.error      { background: #fee2e2; color: #b91c1c; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.7;
    }
    .badge.scanning .dot { animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:0.2} }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    .metric {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 1.25rem 1rem;
      text-align: center;
    }

    .metric-label {
      font-size: 12px;
      color: #999;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .metric-value {
      font-size: 40px;
      font-weight: 600;
      letter-spacing: -1px;
      line-height: 1;
    }

    .metric-unit {
      font-size: 16px;
      font-weight: 400;
      color: #aaa;
      margin-top: 4px;
    }

    #temp-value { color: #dc6b30; }
    #hum-value  { color: #0f9e6e; }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #aaa;
      margin-bottom: 10px;
    }

    .chart-wrap { height: 130px; }

    .log {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 12px;
      color: #555;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.7;
    }

    .log-entry { white-space: pre; }
    .log-ok  { color: #15803d; }
    .log-err { color: #b91c1c; }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      padding: 12px;
      border: 1px solid #d4d4d4;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      color: #1c1c1c;
    }

    button:hover:not(:disabled) { background: #f5f5f5; }
    button:active:not(:disabled) { background: #ebebeb; }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-connect    { border-color: #0f9e6e; color: #0f9e6e; }
    #btn-disconnect { border-color: #dc6b30; color: #dc6b30; }

    .warn {
      display: none;
      margin-top: 1rem;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      color: #9a3412;
      line-height: 1.5;
    }

    .last-update {
      font-size: 11px;
      color: #bbb;
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="title">ESP32 SHT31</div>
      <div class="subtitle">Monitor de temperatura y humedad</div>
    </div>
    <span class="badge idle" id="badge">
      <span class="dot"></span>
      <span id="badge-txt">Desconectado</span>
    </span>
  </header>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Temperatura</div>
      <div class="metric-value" id="temp-value">—</div>
      <div class="metric-unit">°C</div>
    </div>
    <div class="metric">
      <div class="metric-label">Humedad</div>
      <div class="metric-value" id="hum-value">—</div>
      <div class="metric-unit">%</div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Historial</div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Log</div>
    <div class="log" id="log"></div>
  </div>

  <div class="buttons">
    <button id="btn-connect" onclick="connect()">⚡ Conectar</button>
    <button id="btn-disconnect" onclick="disconnect()" disabled>✕ Desconectar</button>
  </div>

  <div class="warn" id="warn">
    Web Bluetooth requiere Chrome en Android, Windows, macOS o Linux con Bluetooth activo. No funciona en Safari ni Firefox.
  </div>

  <div class="last-update" id="last-update"></div>

</div>

<script>
const SERVICE_UUID = '0000181a-0000-1000-8000-00805f9b34fb';
const TEMP_UUID    = '00002a6e-0000-1000-8000-00805f9b34fb';
const HUM_UUID     = '00002a6f-0000-1000-8000-00805f9b34fb';

const MAX_POINTS = 50;
const labels = [], tempData = [], humData = [];
let device, tempChar, humChar;
let tick = 0;
let lastTemp = null, lastHum = null;

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'Temp °C', data: tempData, borderColor: '#dc6b30', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.4 },
      { label: 'Hum %',   data: humData,  borderColor: '#0f9e6e', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.4 }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: { labels: { font: { size: 11 }, boxWidth: 12, padding: 10 } }
    },
    scales: {
      x: { display: false },
      y: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } }
    }
  }
});

function log(msg, type='info') {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('es-ES');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (type==='ok' ? ' log-ok' : type==='err' ? ' log-err' : '');
  entry.textContent = `[${t}] ${type==='ok'?'✓':type==='err'?'✗':'›'} ${msg}`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function setState(state) {
  const badge = document.getElementById('badge');
  const txt   = document.getElementById('badge-txt');
  badge.className = 'badge ' + state;
  txt.textContent = { idle:'Desconectado', scanning:'Buscando…', connected:'Conectado', error:'Error' }[state];
  document.getElementById('btn-connect').disabled    = state === 'connected' || state === 'scanning';
  document.getElementById('btn-disconnect').disabled = state !== 'connected';
}

function parseF32(dv) { return dv.getFloat32(0, true); }

function pushPoint(t, h) {
  tick++;
  labels.push(tick);
  tempData.push(t !== null ? parseFloat(t.toFixed(1)) : (tempData[tempData.length-1] ?? null));
  humData.push(h  !== null ? parseFloat(h.toFixed(1))  : (humData[humData.length-1]  ?? null));
  if (labels.length > MAX_POINTS) { labels.shift(); tempData.shift(); humData.shift(); }
  chart.update('none');
}

function onTemp(e) {
  lastTemp = parseF32(e.target.value);
  document.getElementById('temp-value').textContent = lastTemp.toFixed(1);
  updateTimestamp();
  if (lastHum !== null) pushPoint(lastTemp, lastHum);
}

function onHum(e) {
  lastHum = parseF32(e.target.value);
  document.getElementById('hum-value').textContent = lastHum.toFixed(1);
  updateTimestamp();
}

function updateTimestamp() {
  document.getElementById('last-update').textContent =
    'Última lectura: ' + new Date().toLocaleTimeString('es-ES');
}

async function connect() {
  if (!navigator.bluetooth) {
    document.getElementById('warn').style.display = 'block';
    log('Web Bluetooth no disponible en este navegador', 'err');
    return;
  }
  setState('scanning');
  log('Buscando dispositivo BLE…');
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });
    log('Dispositivo encontrado: ' + device.name);
    device.addEventListener('gattserverdisconnected', onDisconnected);
    const server  = await device.gatt.connect();
    log('GATT conectado', 'ok');
    const service = await server.getPrimaryService(SERVICE_UUID);
    tempChar = await service.getCharacteristic(TEMP_UUID);
    humChar  = await service.getCharacteristic(HUM_UUID);
    await tempChar.startNotifications();
    await humChar.startNotifications();
    tempChar.addEventListener('characteristicvaluechanged', onTemp);
    humChar.addEventListener('characteristicvaluechanged',  onHum);
    log('Recibiendo datos…', 'ok');
    setState('connected');
  } catch(e) {
    log('Error: ' + e.message, 'err');
    setState('error');
  }
}

function disconnect() {
  if (device && device.gatt.connected) device.gatt.disconnect();
}

function onDisconnected() {
  setState('idle');
  log('Dispositivo desconectado', 'err');
  document.getElementById('temp-value').textContent = '—';
  document.getElementById('hum-value').textContent  = '—';
  lastTemp = null; lastHum = null;
}
</script>
</body>
</html>
