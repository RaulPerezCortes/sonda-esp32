<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 SHT31 Monitor BLE Multi-Sensor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f4;
      color: #1c1c1c;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { width: 100%; max-width: 600px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .title { font-size: 19px; font-weight: 600; letter-spacing: -0.2px; }
    .subtitle { font-size: 12px; color: #888; margin-top: 2px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 99px;
      transition: background 0.2s, color 0.2s;
    }
    .badge.idle      { background: #e5e5e5; color: #666; }
    .badge.scanning  { background: #ede9fe; color: #5b21b6; }
    .badge.connected { background: #dcfce7; color: #15803d; }
    .badge.error     { background: #fee2e2; color: #b91c1c; }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.7; }
    .badge.scanning .dot { animation: pulse 1s infinite; }
    .badge.connected .dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:0.2} }

    .sensors-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 1.25rem;
    }

    .sensor-block {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 1rem;
    }

    .sensor-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
      border-bottom: 1px dashed #eee;
      padding-bottom: 4px;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric { text-align: center; padding: 0.5rem; }
    .metric-label { font-size: 11px; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-value { font-size: 32px; font-weight: 600; letter-spacing: -1px; line-height: 1; display: inline-block; }
    .metric-unit  { font-size: 14px; font-weight: 400; color: #aaa; margin-left: 2px; display: inline-block; }

    .t-color { color: #dc6b30; }
    .h-color { color: #0f9e6e; }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; margin-bottom: 10px; }
    .chart-wrap { height: 180px; }

    .log {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 12px;
      color: #555;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.7;
    }

    .log-entry { white-space: pre; }
    .log-ok  { color: #15803d; }
    .log-err { color: #b91c1c; }

    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    button {
      padding: 12px;
      border: 1px solid #d4d4d4;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      color: #1c1c1c;
    }

    button:hover:not(:disabled) { background: #f5f5f5; }
    button:active:not(:disabled) { background: #ebebeb; }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-connect    { border-color: #0f9e6e; color: #0f9e6e; }
    #btn-disconnect { border-color: #dc6b30; color: #dc6b30; }

    .last-update { font-size: 11px; color: #bbb; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="title">ESP32 SHT31 Multi-Sensor BLE</div>
      <div class="subtitle">Monitorización por Array Bluetooth Low Energy</div>
    </div>
    <span class="badge idle" id="badge">
      <span class="dot"></span>
      <span id="badge-txt">Desconectado</span>
    </span>
  </header>

  <div class="sensors-container">
    <div class="sensor-block">
      <div class="sensor-title">Sensor 1 (0x01)</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Temperatura</div>
          <div class="metric-value t-color" id="s1-t">—</div><div class="metric-unit">°C</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humedad</div>
          <div class="metric-value h-color" id="s1-h">—</div><div class="metric-unit">%</div>
        </div>
      </div>
    </div>

    <div class="sensor-block">
      <div class="sensor-title">Sensor 2 (0x02)</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Temperatura</div>
          <div class="metric-value t-color" id="s2-t">—</div><div class="metric-unit">°C</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humedad</div>
          <div class="metric-value h-color" id="s2-h">—</div><div class="metric-unit">%</div>
        </div>
      </div>
    </div>

    <div class="sensor-block">
      <div class="sensor-title">Sensor 3 (0x03)</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Temperatura</div>
          <div class="metric-value t-color" id="s3-t">—</div><div class="metric-unit">°C</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humedad</div>
          <div class="metric-value h-color" id="s3-h">—</div><div class="metric-unit">%</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Historial de Temperaturas</div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <div class="card">
    <div class="card-label">Log</div>
    <div class="log" id="log"></div>
  </div>

  <div class="buttons">
    <button id="btn-connect" onclick="connectBLE()">⚡ Conectar BLE</button>
    <button id="btn-disconnect" onclick="disconnectBLE()" disabled>✕ Desconectar</button>
  </div>

  <div class="last-update" id="last-update"></div>

</div>

<script>
const SERVICE_UUID = '0000181a-0000-1000-8000-00805f9b34fb';
const DATOS_UUID   = '00002a6e-0000-1000-8000-00805f9b34fb';
const POLL_MS      = 2500; // Sincronizado con el delay del ESP32

const MAX_POINTS = 30;
const labels = [];
const s1_t_Data = [], s2_t_Data = [], s3_t_Data = [];
let device, datosChar, pollTimer;
let tick = 0;

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'S1 Temp °C', data: s1_t_Data, borderColor: '#dc6b30', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.4 },
      { label: 'S2 Temp °C', data: s2_t_Data, borderColor: '#3b82f6', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.4 },
      { label: 'S3 Temp °C', data: s3_t_Data, borderColor: '#a855f7', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.4 }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 12, padding: 10 } } },
    scales: {
      x: { display: false },
      y: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } }
    }
  }
});

function log(msg, type='info') {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('es-ES');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (type==='ok' ? ' log-ok' : type==='err' ? ' log-err' : '');
  entry.textContent = `[${t}] ${type==='ok'?'✓':type==='err'?'✗':'›'} ${msg}`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function setState(state) {
  const badge = document.getElementById('badge');
  badge.className = 'badge ' + state;
  document.getElementById('badge-txt').textContent =
    { idle:'Desconectado', scanning:'Buscando…', connected:'Conectado', error:'Error' }[state];
  document.getElementById('btn-connect').disabled    = state === 'connected' || state === 'scanning';
  document.getElementById('btn-disconnect').disabled = state !== 'connected';
}

function pushPoints(t1, t2, t3) {
  tick++;
  labels.push(tick);
  s1_t_Data.push(parseFloat(t1.toFixed(1)));
  s2_t_Data.push(parseFloat(t2.toFixed(1)));
  s3_t_Data.push(parseFloat(t3.toFixed(1)));
  if (labels.length > MAX_POINTS) { 
    labels.shift(); s1_t_Data.shift(); s2_t_Data.shift(); s3_t_Data.shift(); 
  }
  chart.update('none');
}

async function poll() {
  try {
    // Leemos la única característica que contiene el array de 24 bytes
    const valueDV = await datosChar.readValue();
    
    // Validamos que el buffer tenga la longitud correcta para 3 sensores (3 * 8 bytes = 24 bytes)
    if (valueDV.byteLength >= 24) {
      // Sensor 1 (offset 0)
      const t1 = valueDV.getFloat32(0, true);
      const h1 = valueDV.getFloat32(4, true);
      
      // Sensor 2 (offset 8)
      const t2 = valueDV.getFloat32(8, true);
      const h2 = valueDV.getFloat32(12, true);
      
      // Sensor 3 (offset 16)
      const t3 = valueDV.getFloat32(16, true);
      const h3 = valueDV.getFloat32(20, true);

      // Actualizar frontend
      document.getElementById('s1-t').textContent = t1.toFixed(1);
      document.getElementById('s1-h').textContent = h1.toFixed(1);
      document.getElementById('s2-t').textContent = t2.toFixed(1);
      document.getElementById('s2-h').textContent = h2.toFixed(1);
      document.getElementById('s3-t').textContent = t3.toFixed(1);
      document.getElementById('s3-h').textContent = h3.toFixed(1);

      document.getElementById('last-update').textContent =
        'Última lectura: ' + new Date().toLocaleTimeString('es-ES');
      
      pushPoints(t1, t2, t3);
    } else {
      log('Buffer incompleto recibido: ' + valueDV.byteLength + ' bytes', 'err');
    }
  } catch(e) {
    log('Error leyendo: ' + e.message, 'err');
    stopPolling();
    setState('error');
  }
}

function startPolling() {
  poll();
  pollTimer = setInterval(poll, POLL_MS);
}

function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
}

async function connectBLE() {
  if (!navigator.bluetooth) {
    log('Web Bluetooth no disponible en este navegador (usa Chrome/Edge)', 'err');
    return;
  }
  setState('scanning');
  log('Buscando dispositivo BLE…');
  try {
    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }]
    });
    log('Dispositivo encontrado: ' + device.name);
    device.addEventListener('gattserverdisconnected', onDisconnected);
    
    const server  = await device.gatt.connect();
    log('Servidor GATT conectado', 'ok');
    
    const service = await server.getPrimaryService(SERVICE_UUID);
    datosChar = await service.getCharacteristic(DATOS_UUID);
    
    log('Conectado. Leyendo datos estructurados cada ' + (POLL_MS/1000) + 's…', 'ok');
    setState('connected');
    startPolling();
  } catch(e) {
    log('Error: ' + e.message, 'err');
    setState('error');
  }
}

function disconnectBLE() {
  stopPolling();
  if (device && device.gatt.connected) device.gatt.disconnect();
}

function onDisconnected() {
  stopPolling();
  setState('idle');
  log('Dispositivo BLE desconectado', 'err');
  document.querySelectorAll('.metric-value').forEach(el => el.textContent = '—');
}
</script>
</body>
</html>
