<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 SHT31 Monitor Multi-Sensor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f4;
      color: #1c1c1c;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { width: 100%; max-width: 600px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .title { font-size: 19px; font-weight: 600; letter-spacing: -0.2px; }
    .subtitle { font-size: 12px; color: #888; margin-top: 2px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 99px;
      transition: background 0.2s, color 0.2s;
    }
    .badge.idle      { background: #e5e5e5; color: #666; }
    .badge.scanning  { background: #ede9fe; color: #5b21b6; }
    .badge.connected { background: #dcfce7; color: #15803d; }
    .badge.error     { background: #fee2e2; color: #b91c1c; }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: 0.7; }
    .badge.scanning .dot { animation: pulse 1s infinite; }
    .badge.connected .dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:0.7} 50%{opacity:0.2} }

    /* Contenedor principal de sensores */
    .sensors-container {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 1.25rem;
    }

    .sensor-block {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 1rem;
    }

    .sensor-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
      border-bottom: 1px dashed #eee;
      padding-bottom: 4px;
    }

    .metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric {
      text-align: center;
      padding: 0.5rem;
    }

    .metric-label { font-size: 11px; color: #999; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .metric-value { font-size: 32px; font-weight: 600; letter-spacing: -1px; line-height: 1; display: inline-block; }
    .metric-unit  { font-size: 14px; font-weight: 400; color: #aaa; margin-left: 2px; display: inline-block; }

    .t-color { color: #dc6b30; }
    .h-color { color: #0f9e6e; }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1.25rem;
    }

    .card-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #aaa; margin-bottom: 10px; }
    .chart-wrap { height: 180px; }

    .log {
      font-family: 'SF Mono', 'Fira Mono', monospace;
      font-size: 12px;
      color: #555;
      max-height: 130px;
      overflow-y: auto;
      line-height: 1.7;
    }

    .log-entry { white-space: pre; }
    .log-ok  { color: #15803d; }
    .log-err { color: #b91c1c; }

    .buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    button {
      padding: 12px;
      border: 1px solid #d4d4d4;
      border-radius: 10px;
      background: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      color: #1c1c1c;
    }

    button:hover:not(:disabled) { background: #f5f5f5; }
    button:active:not(:disabled) { background: #ebebeb; }
    button:disabled { opacity: 0.4; cursor: default; }

    #btn-connect    { border-color: #0f9e6e; color: #0f9e6e; }
    #btn-disconnect { border-color: #dc6b30; color: #dc6b30; }

    .last-update { font-size: 11px; color: #bbb; text-align: center; margin-top: 1rem; }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div>
      <div class="title">ESP32 SHT31 Multi-Sensor</div>
      <div class="subtitle">Monitorización simultánea por Bluetooth Serial</div>
    </div>
    <span class="badge idle" id="badge">
      <span class="dot"></span>
      <span id="badge-txt">Desconectado</span>
    </span>
  </header>

  <div class="sensors-container">
    <div class="sensor-block">
      <div class="sensor-title">Sensor 1 (0x01)</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Temperatura</div>
          <div class="metric-value t-color" id="s1-t">—</div><div class="metric-unit">°C</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humedad</div>
          <div class="metric-value h-color" id="s1-h">—</div><div class="metric-unit">%</div>
        </div>
      </div>
    </div>

    <div class="sensor-block">
      <div class="sensor-title">Sensor 2 (0x02)</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Temperatura</div>
          <div class="metric-value t-color" id="s2-t">—</div><div class="metric-unit">°C</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humedad</div>
          <div class="metric-value h-color" id="s2-h">—</div><div class="metric-unit">%</div>
        </div>
      </div>
    </div>

    <div class="sensor-block">
      <div class="sensor-title">Sensor 3 (0x03)</div>
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Temperatura</div>
          <div class="metric-value t-color" id="s3-t">—</div><div class="metric-unit">°C</div>
        </div>
        <div class="metric">
          <div class="metric-label">Humedad</div>
          <div class="metric-value h-color" id="s3-h">—</div><div class="metric-unit">%</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Historial de Temperaturas</div>
    <div class="chart-wrap"><canvas id="chart"></canvas></div>
  </div>

  <div class="card">
    <div class="card-label">Log del Sistema</div>
    <div class="log" id="log"></div>
  </div>

  <div class="buttons">
    <button id="btn-connect" onclick="connectSerial()">⚡ Conectar BT</button>
    <button id="btn-disconnect" onclick="disconnectSerial()" disabled>✕ Desconectar</button>
  </div>

  <div class="last-update" id="last-update"></div>

</div>

<script>
const MAX_POINTS = 30;
const labels = [];
// Arrays de datos independientes para las gráficas
const s1_t_Data = [], s2_t_Data = [], s3_t_Data = [];
let port, reader, keepReading = false;
let tick = 0;

const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line',
  data: {
    labels,
    datasets: [
      { label: 'S1 Temp °C', data: s1_t_Data, borderColor: '#dc6b30', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.4 },
      { label: 'S2 Temp °C', data: s2_t_Data, borderColor: '#3b82f6', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.4 },
      { label: 'S3 Temp °C', data: s3_t_Data, borderColor: '#a855f7', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, tension: 0.4 }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: { legend: { labels: { font: { size: 11 }, boxWidth: 12, padding: 10 } } },
    scales: {
      x: { display: false },
      y: { ticks: { font: { size: 11 } }, grid: { color: 'rgba(0,0,0,0.05)' } }
    }
  }
});

function log(msg, type='info') {
  const el = document.getElementById('log');
  const t = new Date().toLocaleTimeString('es-ES');
  const entry = document.createElement('div');
  entry.className = 'log-entry' + (type==='ok' ? ' log-ok' : type==='err' ? ' log-err' : '');
  entry.textContent = `[${t}] ${type==='ok'?'✓':type==='err'?'✗':'›'} ${msg}`;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function setState(state) {
  const badge = document.getElementById('badge');
  badge.className = 'badge ' + state;
  document.getElementById('badge-txt').textContent =
    { idle:'Desconectado', scanning:'Emparejando…', connected:'Conectado', error:'Error' }[state];
  document.getElementById('btn-connect').disabled    = state === 'connected' || state === 'scanning';
  document.getElementById('btn-disconnect').disabled = state !== 'connected';
}

function pushPoints(t1, t2, t3) {
  tick++;
  labels.push(tick);
  s1_t_Data.push(t1);
  s2_t_Data.push(t2);
  s3_t_Data.push(t3);
  
  if (labels.length > MAX_POINTS) {
    labels.shift();
    s1_t_Data.shift();
    s2_t_Data.shift();
    s3_t_Data.shift();
  }
  chart.update('none');
}

async function connectSerial() {
  if (!navigator.serial) {
    log('Web Serial no está soportado en este navegador. Usa Chrome o Edge.', 'err');
    return;
  }

  setState('scanning');
  log('Por favor, selecciona tu dispositivo Bluetooth configurado en el sistema…');

  try {
    // Solicita puerto serial (Aparecerá el menú nativo del navegador)
    port = await navigator.serial.requestPort();
    // Abrimos el puerto a la misma velocidad asignada en el SerialBT del ESP32
    await port.open({ baudRate: 115200 });
    
    log('¡Puerto Bluetooth Serial Conectado con éxito!', 'ok');
    setState('connected');
    
    keepReading = true;
    readLoop();
  } catch (e) {
    log('Error al conectar: ' + e.message, 'err');
    setState('error');
  }
}

async function readLoop() {
  const textDecoder = new TextDecoderStream();
  const readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
  reader = textDecoder.readable.getReader();

  let bufferString = "";

  try {
    while (keepReading) {
      const { value, done } = await reader.read();
      if (done) break;
      
      if (value) {
        bufferString += value;
        // Procesamos si encontramos un salto de línea enviado por el ESP32 (\n)
        if (bufferString.includes('\n')) {
          const lines = bufferString.split('\n');
          // Guardamos la última porción incompleta para el siguiente loop
          bufferString = lines.pop(); 
          
          for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            
            // Separamos los 6 valores numéricos esperados (T1,H1,T2,H2,T3,H3)
            const valores = line.split(',');
            if (valores.length === 6) {
              const t1 = parseFloat(valores[0]), h1 = parseFloat(valores[1]);
              const t2 = parseFloat(valores[2]), h2 = parseFloat(valores[3]);
              const t3 = parseFloat(valores[4]), h3 = parseFloat(valores[5]);

              // Pintar datos en el panel visual
              document.getElementById('s1-t').textContent = t1.toFixed(1);
              document.getElementById('s1-h').textContent = h1.toFixed(1);
              document.getElementById('s2-t').textContent = t2.toFixed(1);
              document.getElementById('s2-h').textContent = h2.toFixed(1);
              document.getElementById('s3-t').textContent = t3.toFixed(1);
              document.getElementById('s3-h').textContent = h3.toFixed(1);

              document.getElementById('last-update').textContent =
                'Última actualización: ' + new Date().toLocaleTimeString('es-ES');

              // Añadir puntos a la gráfica de historial
              pushPoints(t1, t2, t3);
            }
          }
        }
      }
    }
  } catch (error) {
    log('Error durante la lectura de datos: ' + error.message, 'err');
    setState('error');
  } finally {
    reader.releaseLock();
  }
}

async function disconnectSerial() {
  keepReading = false;
  if (reader) {
    await reader.cancel();
  }
  if (port) {
    await port.close();
  }
  log('Desconectado del dispositivo serial.', 'info');
  setState('idle');
  
  // Limpiar valores en pantalla
  document.querySelectorAll('.metric-value').forEach(el => el.textContent = '—');
}
</script>
</body>
</html>
